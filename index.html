```html
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Missão Secreta ❤️</title>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family: Arial, sans-serif;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    background:linear-gradient(135deg,#ff5f8f,#ff9ec4);
}

.container{
    width:90%;
    max-width:550px;
    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(12px);
    border-radius:25px;
    padding:35px;
    text-align:center;
    color:white;
    z-index:2;
}

h1{
    margin-bottom:20px;
}

h2{
    margin-bottom:15px;
}

input{
    width:100%;
    padding:15px;
    border:none;
    border-radius:12px;
    margin-top:10px;
    text-align:center;
    font-size:16px;
}

button{
    margin-top:15px;
    padding:12px 30px;
    border:none;
    border-radius:12px;
    cursor:pointer;
    background:white;
    color:#ff4d8d;
    font-weight:bold;
    font-size:16px;
}

button:hover{
    transform:scale(1.05);
}

#feedback{
    margin-top:15px;
    min-height:30px;
    font-size:18px;
}

.hidden{
    display:none;
}

.heart{
    position:absolute;
    color:white;
    opacity:0.25;
    animation:float 8s linear infinite;
}

@keyframes float{
    from{
        transform:translateY(100vh);
    }
    to{
        transform:translateY(-100px);
    }
}

.progress{
    width:100%;
    height:25px;
    background:rgba(255,255,255,.25);
    border-radius:20px;
    overflow:hidden;
    margin-top:20px;
}

.progress-bar{
    width:0%;
    height:100%;
    background:white;
}

#percent{
    margin-top:10px;
    font-size:22px;
    font-weight:bold;
}

</style>
</head>
<body>

<div class="container">

<h1>🔒 Missão Secreta ❤️</h1>

<div id="quiz">

<h2 id="question"></h2>

<input
id="answer"
type="text"
placeholder="Digite sua resposta">

<button onclick="checkAnswer()">
Responder ❤️
</button>

<div id="feedback"></div>

</div>

<div id="loading" class="hidden">

<h2>❤️ Compatibilidade Encontrada ❤️</h2>

<p>
Verificando as memórias...
</p>

<div class="progress">
<div class="progress-bar" id="bar"></div>
</div>

<div id="percent">0%</div>

</div>

</div>

<script>

const questions = [
{
question:"Qual nome do nosso "elixir do amor eterno" degustado no primeiro encontro?",
answer:"jurupinga",
message:"✨ Primeira memória desbloqueada!"
},
{
question:"Olhe para trás. Quem está dizendo "te amo" pra você por mim?",
answer:"elijah",
message:"💖 Você está indo muito bem!"
},
{
question:"Quero ver se lembra dessa hehe onde fomos antes de voltar?",
answer:"cinema",
message:"Ainda não supero não ter te beijado na saída do shopping"
}
];

let current = 0;

createHearts();

loadQuestion();

function createHearts(){

    for(let i=0;i<25;i++){

        const heart=document.createElement("div");

        heart.innerHTML="❤️";

        heart.classList.add("heart");

        heart.style.left=Math.random()*100+"vw";

        heart.style.fontSize=
        (15+Math.random()*25)+"px";

        heart.style.animationDuration=
        (5+Math.random()*8)+"s";

        document.body.appendChild(heart);
    }
}

function loadQuestion(){

    document.getElementById("question")
    .innerText=questions[current].question;

    document.getElementById("answer").value="";
    document.getElementById("feedback").innerHTML="";
}

function confettiExplosion(){

    confetti({
        particleCount:120,
        spread:100,
        origin:{y:0.6}
    });
}

function checkAnswer(){

    const userAnswer=
    document.getElementById("answer")
    .value
    .trim()
    .toLowerCase();

    const correct=
    questions[current].answer.toLowerCase();

    if(userAnswer===correct){

        confettiExplosion();

        document.getElementById("feedback")
        .innerHTML=
        questions[current].message;

        current++;

        if(current<questions.length){

            setTimeout(loadQuestion,1800);

        }else{

            setTimeout(startLoading,1500);
        }

    }else{

        document.getElementById("feedback")
        .innerHTML=
        "❌ Hmmm... tenta lembrar melhor ❤️";
    }
}

function startLoading(){

    document.getElementById("quiz")
    .classList.add("hidden");

    document.getElementById("loading")
    .classList.remove("hidden");

    let progress=0;

    const interval=setInterval(()=>{

        progress+=1;

        document.getElementById("bar")
        .style.width=progress+"%";

        document.getElementById("percent")
        .innerText=progress+"%";

        if(progress>=100){

            clearInterval(interval);

            setTimeout(()=>{

                window.location.href=
                "https://canva.link/i9d2a4yh00cwkj2";

            },1000);
        }

    },40);

}

document
.getElementById("answer")
.addEventListener("keypress",function(e){

    if(e.key==="Enter"){
        checkAnswer();
    }

});

</script>

</body>
</html>
```
