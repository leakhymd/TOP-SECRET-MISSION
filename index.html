<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Missão Secreta ❤️</title>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>

<style>

body{
    margin:0;
    font-family: Arial, sans-serif;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background: linear-gradient(135deg,#ff5f8f,#ff9ec4);
    overflow:hidden;
}

.container{
    width:90%;
    max-width:500px;
    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(15px);
    padding:30px;
    border-radius:25px;
    text-align:center;
    color:white;
    box-shadow:0 20px 40px rgba(0,0,0,0.2);
}

button{
    padding:12px 25px;
    border:none;
    border-radius:12px;
    background:white;
    color:#ff3f7f;
    font-weight:bold;
    cursor:pointer;
    margin-top:15px;
    transition:0.2s;
}

button:hover{
    transform:scale(1.05);
}

input{
    width:90%;
    padding:12px;
    border:none;
    border-radius:10px;
    margin-top:15px;
    text-align:center;
}

.hidden{ display:none; }

#typing{
    font-style:italic;
    opacity:0.8;
    margin-top:10px;
}

</style>
</head>

<body>

<div class="container">

<!-- TELA INICIAL -->
<div id="startScreen">
    <h1>🔒 Missão Secreta ❤️</h1>
    <p>Você está prestes a desbloquear algo especial...</p>
    <button onclick="startGame()">Começar missão 💖</button>
</div>

<!-- QUIZ -->
<div id="quiz" class="hidden">

    <h2 id="question"></h2>

    <input id="answer" placeholder="Digite sua resposta">

    <br>

    <button onclick="checkAnswer()">Responder ❤️</button>

    <div id="typing"></div>

</div>

<!-- FINAL -->
<div id="final" class="hidden">
    <h1>❤️ Compatibilidade 100% ❤️</h1>
    <p>Redirecionando para algo especial...</p>
</div>

</div>

<script>

const questions = [
{
    q: "Qual nome do 'Elixir do Amor Eterno' degustado no nosso primeiro encontro?",
    a: "jurupinga"
},
{
    q: "O que estava gravado nas primeiras alianças?",
    a: "sol e lua"
},
{
    q: "Onde tiramos nossa primeira foto juntos?",
    a: "largo da ordem"
}
];

let current = 0;

function startGame(){
    document.getElementById("startScreen").classList.add("hidden");
    document.getElementById("quiz").classList.remove("hidden");
    showQuestion();
}

function showQuestion(){

    let q = questions[current].q;
    let i = 0;

    document.getElementById("question").innerText = "";

    let typing = setInterval(()=>{

        document.getElementById("question").innerText += q[i];
        i++;

        if(i >= q.length){
            clearInterval(typing);
        }

    },40);
}

function confettiExplosion(){
    confetti({
        particleCount: 120,
        spread: 100,
        origin: { y: 0.6 }
    });
}

function checkAnswer(){

    let user = document.getElementById("answer").value.trim().toLowerCase();
    let correct = questions[current].a.toLowerCase();

    // ✔ CORREÇÃO PRINCIPAL: aceita variações da resposta
    if(user.includes(correct)){

        confettiExplosion();

        document.getElementById("typing").innerText =
        "❤️ memória desbloqueada...";

        setTimeout(()=>{

            current++;

            if(current < questions.length){

                document.getElementById("answer").value = "";
                document.getElementById("typing").innerText = "";
                showQuestion();

            } else {
                finish();
            }

        },1200);

    } else {

        document.getElementById("typing").innerText =
        "❌ Hmmm... tenta lembrar melhor ❤️";
    }
}

function finish(){

    document.getElementById("quiz").classList.add("hidden");
    document.getElementById("final").classList.remove("hidden");

    setTimeout(()=>{
        window.location.href = "https://canva.link/i9d2a4yh00cwkj2";
    },2500);

}

document.getElementById("answer")
.addEventListener("keypress", function(e){
    if(e.key === "Enter"){
        checkAnswer();
    }
});

</script>

</body>
</html>
